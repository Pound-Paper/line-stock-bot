services:
  - type: web
    name: line-stock-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: SHOPIFY_STORE
        sync: false
      - key: SHOPIFY_ADMIN_TOKEN
        sync: false
